<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Login - FraudGuard AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav>
    <div class="logo">FraudGuard AI</div>
</nav>

<div class="form-container">

    <h2>Login</h2>

    {% if error %}
    <div style="
        color:red;
        text-align:center;
        margin-bottom:15px;
        font-weight:bold;
    ">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email"
            value="{{ email if email else '' }}"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Login
        </button>

        <p style="margin-top:15px; text-align:center;">
            Don't have an account?
            <a href="/register">Register Here</a>
        </p>

    </form>

</div>

</body>
</html>
